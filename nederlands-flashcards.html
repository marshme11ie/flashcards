<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nederlands Flashcards · NVA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #f4ede0;
    --cream-deep: #ebe2cf;
    --ink: #1a1816;
    --orange: #d9551f;
    --orange-deep: #b03e10;
    --green: #2d5f3f;
    --green-soft: #4a7a5c;
    --rust: #8b4513;
    --paper: #faf6ec;
    --line: #1a1816;
    --shadow: rgba(26, 24, 22, 0.12);
  }
  html, body {
    height: 100%;
    background: var(--cream);
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
    overflow-x: hidden;
  }
  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(217, 85, 31, 0.06) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(45, 95, 63, 0.05) 0%, transparent 45%);
    min-height: 100vh;
    padding: 24px 16px 80px;
  }
  .wrap {
    max-width: 920px;
    margin: 0 auto;
  }

  /* HEADER */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 14px;
    margin-bottom: 28px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .brand {
    display: flex;
    flex-direction: column;
  }
  .brand .top-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--rust);
    margin-bottom: 6px;
  }
  .dot {
    width: 7px; height: 7px;
    background: var(--orange);
    border-radius: 50%;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: clamp(34px, 6vw, 54px);
    line-height: 0.95;
    letter-spacing: -0.025em;
    font-style: italic;
  }
  h1 em {
    font-style: normal;
    color: var(--orange);
  }
  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--green-soft);
    text-align: right;
  }
  .subtitle strong {
    display: block;
    font-size: 22px;
    color: var(--ink);
    font-weight: 500;
    letter-spacing: 0.02em;
    text-transform: none;
    font-family: 'Fraunces', serif;
    font-style: italic;
    margin-top: 2px;
  }

  /* LESSON SELECTOR */
  .selector-shell {
    background: var(--paper);
    border: 1.5px solid var(--ink);
    padding: 18px 18px 14px;
    margin-bottom: 24px;
    position: relative;
  }
  .selector-shell::before {
    content: 'KIES JE LES';
    position: absolute;
    top: -10px; left: 16px;
    background: var(--cream);
    padding: 0 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--rust);
  }
  .lesson-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(56px, 1fr));
    gap: 6px;
  }
  .lesson-btn {
    aspect-ratio: 1;
    background: transparent;
    border: 1.5px solid var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .lesson-btn:hover {
    background: var(--ink);
    color: var(--cream);
    transform: translate(-2px, -2px);
    box-shadow: 4px 4px 0 var(--orange);
  }
  .lesson-btn.active {
    background: var(--orange);
    color: var(--paper);
    border-color: var(--ink);
    transform: translate(-2px, -2px);
    box-shadow: 4px 4px 0 var(--ink);
  }

  /* CURRENT LESSON HEADER */
  .lesson-info {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 18px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .lesson-info h2 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: clamp(22px, 4vw, 32px);
    font-style: italic;
    letter-spacing: -0.02em;
  }
  .lesson-info .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--rust);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* CARD STAGE */
  .stage {
    perspective: 1600px;
    margin-bottom: 22px;
  }
  .card {
    position: relative;
    width: 100%;
    aspect-ratio: 5 / 3;
    max-height: 360px;
    transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(0.4, 0.1, 0.2, 1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card.no-transition { transition: none !important; }
  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border: 2px solid var(--ink);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 32px 24px;
    text-align: center;
    box-shadow: 8px 8px 0 var(--ink);
  }
  .face .corner {
    position: absolute;
    top: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .face .corner.tl { left: 16px; }
  .face .corner.tr { right: 16px; }
  .face .corner.br { right: 16px; bottom: 14px; top: auto; }
  .face .corner.bl { left: 16px; bottom: 14px; top: auto; font-style: italic; font-family: 'Fraunces', serif; }
  .face .word {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.025em;
    font-size: clamp(34px, 7vw, 56px);
    max-width: 100%;
    word-wrap: break-word;
    hyphens: auto;
  }
  .face .hint {
    margin-top: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--rust);
    opacity: 0.7;
  }

  .face.front {
    background: var(--paper);
    color: var(--ink);
  }
  .face.front .corner { color: var(--orange-deep); }
  .face.front::after {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px dashed var(--ink);
    pointer-events: none;
    opacity: 0.25;
  }

  .face.back {
    background: var(--ink);
    color: var(--paper);
    transform: rotateY(180deg);
  }
  .face.back .corner { color: var(--orange); }
  .face.back .word { color: var(--paper); }
  .face.back .word em {
    font-style: italic;
    color: var(--orange);
  }
  .face.back::after {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px dashed var(--paper);
    pointer-events: none;
    opacity: 0.25;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
  }
  .nav-btn {
    flex: 0 0 auto;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    padding: 12px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.16s ease;
    color: var(--ink);
    font-weight: 500;
  }
  .nav-btn:hover:not(:disabled) {
    background: var(--ink);
    color: var(--paper);
    transform: translate(-2px, -2px);
    box-shadow: 4px 4px 0 var(--orange);
  }
  .nav-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .counter {
    flex: 1;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--ink);
    letter-spacing: 0.05em;
  }
  .counter .num {
    font-size: 28px;
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-style: italic;
    color: var(--orange-deep);
  }
  .counter .slash { color: var(--rust); margin: 0 6px; }

  /* PROGRESS */
  .progress {
    height: 4px;
    background: var(--cream-deep);
    border: 1px solid var(--ink);
    margin-bottom: 22px;
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    position: absolute;
    inset: 0 auto 0 0;
    background: var(--orange);
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* OPTIONS */
  .options {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    padding: 14px;
    border: 1px dashed var(--ink);
    background: rgba(250, 246, 236, 0.5);
  }
  .opt-btn {
    background: transparent;
    border: 1px solid var(--ink);
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    color: var(--ink);
    transition: all 0.15s;
  }
  .opt-btn:hover {
    background: var(--green);
    color: var(--paper);
    border-color: var(--green);
  }
  .opt-btn.toggle.on {
    background: var(--green);
    color: var(--paper);
    border-color: var(--green);
  }
  .opt-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--rust);
  }

  /* FOOTER */
  footer {
    margin-top: 36px;
    padding-top: 16px;
    border-top: 1px solid var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--rust);
    text-align: center;
  }

  /* keyboard hint */
  .kbd {
    display: inline-block;
    padding: 2px 6px;
    border: 1px solid var(--ink);
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    background: var(--cream);
    margin: 0 2px;
  }

  @media (max-width: 600px) {
    body { padding: 16px 12px 60px; }
    .face { padding: 24px 18px; box-shadow: 5px 5px 0 var(--ink); }
    .nav-btn { padding: 10px 14px; font-size: 11px; }
    .counter .num { font-size: 22px; }
    h1 { font-size: 36px; }
  }
</style>
</head>

<div class="wrap">

<header>
  <div class="brand">
    <div class="top-row">
      <span class="dot"></span>
      <span>Nederlands voor anderstaligen</span>
    </div>
    <h1>Flash<em>kaarten</em></h1>
  </div>
  <div class="subtitle">
    42 lessons · 2169 words
    <strong>Boom · 2018</strong>
  </div>

<div class="selector-shell">

</div>

</div>

    <div class="face back">

      <span class="corner tr" id="backIdx"></span>

      <span class="hint">Tap to flip back</span>
      <span class="corner bl">flashkaarten</span>
      <span class="corner br" id="backLesson"></span>
    </div>
  </div>
</div>

<div class="progress"><div class="progress-fill" id="progressFill"></div></div>

<div class="controls">
  <button class="nav-btn" id="prevBtn">← Vorige</button>
  <div class="counter">
    <span class="num" id="currentNum">1</span><span class="slash">/</span><span id="totalNum">0</span>

  <button class="nav-btn" id="nextBtn">Volgende →</button>
</div>

<div class="options">
  <span class="opt-label">Mode:</span>
  <button class="opt-btn toggle" id="flipModeBtn">Show NL first</button>
  <button class="opt-btn" id="shuffleBtn">⇄ Shuffle</button>
  <button class="opt-btn" id="resetBtn">↺ Reset order</button>
</div>

<footer>
  Click card or press SPACE to flip · Arrow keys to navigate
</footer>

</div>

const state = {
  lesson: 1,
  index: 0,
  flipped: false,
  showNLFirst: true,
  cards: [],
};

const els = {
  grid: document.getElementById('lessonGrid'),
  title: document.getElementById('lessonTitle'),
  meta: document.getElementById('lessonMeta'),
  card: document.getElementById('card'),
  frontWord: document.getElementById('frontWord'),
  backWord: document.getElementById('backWord'),
  frontLang: document.getElementById('frontLang'),
  backLang: document.getElementById('backLang'),
  frontIdx: document.getElementById('frontIdx'),
  backIdx: document.getElementById('backIdx'),
  frontLesson: document.getElementById('frontLesson'),
  backLesson: document.getElementById('backLesson'),
  prev: document.getElementById('prevBtn'),
  next: document.getElementById('nextBtn'),
  currentNum: document.getElementById('currentNum'),
  totalNum: document.getElementById('totalNum'),
  fill: document.getElementById('progressFill'),
  flipMode: document.getElementById('flipModeBtn'),
  shuffle: document.getElementById('shuffleBtn'),
  reset: document.getElementById('resetBtn'),
};

function buildGrid() {
  els.grid.innerHTML = '';
  Object.keys(DATA).sort((a,b) => +a - +b).forEach(num => {
    const btn = document.createElement('button');
    btn.className = 'lesson-btn';
    btn.textContent = num;
    btn.title = DATA[num].title;
    btn.dataset.lesson = num;
    btn.addEventListener('click', () => loadLesson(+num));
    els.grid.appendChild(btn);
  });
}

function loadLesson(num) {
  resetFlipInstant();
  state.lesson = num;
  state.cards = DATA[num].words.map((w, i) => ({...w, originalIdx: i}));
  state.index = 0;
  document.querySelectorAll('.lesson-btn').forEach(b => {
    b.classList.toggle('active', +b.dataset.lesson === num);
  });
  els.title.textContent = 'Les ' + num + ' · ' + DATA[num].title;
  els.meta.textContent = state.cards.length + ' woorden';
  render();
}

function render() {
  const card = state.cards[state.index];
  if (!card) return;

  const nl = card.nl;
  const en = card.en;

  // Determine which side shows what based on showNLFirst
  if (state.showNLFirst) {
    els.frontWord.textContent = nl;
    els.backWord.textContent = en;
    els.frontLang.textContent = 'NEDERLANDS';
    els.backLang.textContent = 'ENGLISH';
  } else {
    els.frontWord.textContent = en;
    els.backWord.textContent = nl;
    els.frontLang.textContent = 'ENGLISH';
    els.backLang.textContent = 'NEDERLANDS';
  }

  const idxLabel = String(state.index + 1).padStart(2,'0') + '/' + String(state.cards.length).padStart(2,'0');
  els.frontIdx.textContent = idxLabel;
  els.backIdx.textContent = idxLabel;
  els.frontLesson.textContent = 'LES ' + state.lesson;
  els.backLesson.textContent = 'LES ' + state.lesson;

  els.card.classList.toggle('flipped', state.flipped);

  els.currentNum.textContent = state.index + 1;
  els.totalNum.textContent = state.cards.length;
  const pct = ((state.index + 1) / state.cards.length) * 100;
  els.fill.style.width = pct + '%';

  els.prev.disabled = state.index === 0;
  els.next.disabled = state.index === state.cards.length - 1;
}

function flip() {
  state.flipped = !state.flipped;
  render();
}

function resetFlipInstant() {
  // If currently flipped, snap back to front face without animating
  // so the user never sees the next card's back during transition.
  if (state.flipped) {
    els.card.classList.add('no-transition');
    state.flipped = false;
    els.card.classList.remove('flipped');
    // Force reflow so the no-transition style is applied before we re-enable
    void els.card.offsetWidth;
    els.card.classList.remove('no-transition');
  }
}

function next() {
  if (state.index < state.cards.length - 1) {
    resetFlipInstant();
    state.index++;
    render();
  }
}

function prev() {
  if (state.index > 0) {
    resetFlipInstant();
    state.index--;
    render();
  }
}

function shuffle() {
  for (let i = state.cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [state.cards[i], state.cards[j]] = [state.cards[j], state.cards[i]];
  }
  resetFlipInstant();
  state.index = 0;
  render();
}

function resetOrder() {
  state.cards = DATA[state.lesson].words.map((w, i) => ({...w, originalIdx: i}));
  resetFlipInstant();
  state.index = 0;
  render();
}

// Wire up
els.card.addEventListener('click', flip);
els.prev.addEventListener('click', prev);
els.next.addEventListener('click', next);
els.shuffle.addEventListener('click', shuffle);
els.reset.addEventListener('click', resetOrder);
els.flipMode.addEventListener('click', () => {
  state.showNLFirst = !state.showNLFirst;
  els.flipMode.textContent = state.showNLFirst ? 'Show NL first' : 'Show EN first';
  els.flipMode.classList.toggle('on', !state.showNLFirst);
  resetFlipInstant();
  render();
});

document.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
  else if (e.key === 'ArrowRight') { e.preventDefault(); next(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
});

buildGrid();
loadLesson(1);
</script>
